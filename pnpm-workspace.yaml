packages: [ "/apps/*", "/components/*", "integrations/*" ]
allowBuilds:
  '@parcel/watcher': true
  '@posthog/cli': true
  '@swc/core': true
  core-js: true
  esbuild: true
  nx: true
  protobufjs: true
  sharp: true
  unrs-resolver: true
  vue-demi: true
  workerd: true
minimumReleaseAge: 2880
minimumReleaseAgeExclude:
  - '@posthog/cli@0.7.13'
  - '@posthog/core@1.29.9'
  - '@posthog/nuxt@1.7.42'
  - '@posthog/types@1.376.0'
  - miniflare@4.20260521.0
  - posthog-js@1.376.0
  - posthog-node@5.35.1
  - wrangler@4.94.0
