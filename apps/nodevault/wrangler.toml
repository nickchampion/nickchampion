name = "nodevault"
main = ".output/server/worker.mjs"
compatibility_date = "2025-07-15"
compatibility_flags = ["nodejs_compat"]

# Globals variables
workers_dev = false
upload_source_maps = true
assets = { directory = "./.output/public/", binding = "ASSETS" }

[observability.logs]
enabled = false

[vars]
NUXT_PUBLIC_VERSION = "1.0.0"
NUXT_PUBLIC_ENVIRONMENT = "prod"

[env.nodevault]
version_metadata = { binding = "CF_VERSION_METADATA" }
vars = { NUXT_PUBLIC_ENVIRONMENT = "prod", NUXT_PUBLIC_VERSION = "1.0.0" }
name = "nodevault"
route = { pattern = "www.nodevault.cloud", custom_domain = true, zone_name = "nodevault.cloud" }

[[env.nodevault.kv_namespaces]]
binding = "nodevault"
id = "344ac07f484d4371927c72b08caaeb2b"
